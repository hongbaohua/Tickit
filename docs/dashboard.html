<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickit — 考生管理</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tickit" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-icon"></div>
      <span class="sidebar-title">Tickit</span>
    </div>
    <nav>
      <a href="index.html" class="nav-link"><span class="nav-dot"></span>首頁</a>
      <a href="dashboard.html" class="nav-link active"><span class="nav-dot"></span>考生管理</a>
    </nav>
  </aside>

  <main class="main main-wide">

    <!-- Header banner -->
    <div style="background:linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#334155 100%);
                border-radius:14px;padding:1.5rem 1.8rem;margin-bottom:1.5rem;
                border:1px solid #334155;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:1.15rem;font-weight:800;color:white;
                      margin-bottom:0.2rem;letter-spacing:-0.3px;">考生管理</div>
          <div style="color:#64748B;font-size:0.78rem;">查看測驗記錄與弱點診斷分析</div>
        </div>
        <div style="background:rgba(99,102,241,0.2);border-radius:10px;
                    padding:0.5rem 1rem;border:1px solid rgba(99,102,241,0.3);">
          <div style="color:#A5B4FC;font-size:0.72rem;font-weight:600;
                      letter-spacing:0.5px;text-transform:uppercase;">Dashboard</div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading">載入中…</div>
    <div id="content" style="display:none;">

      <!-- User selector -->
      <div class="card" style="margin-bottom:1.2rem;">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">👤 選擇用戶</span>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <input type="text" id="user-input" list="user-datalist"
                 placeholder="輸入或選擇用戶代號" autocomplete="off"
                 style="flex:1;" />
          <button class="btn btn-primary btn-sm" id="btn-search-user"
                  style="white-space:nowrap;">查詢</button>
        </div>
        <datalist id="user-datalist"></datalist>
        <p class="field-hint" id="user-hint" style="margin-top:0.4rem;"></p>
      </div>

      <!-- 未登入且尚未查詢時的佔位提示 -->
      <div id="no-selection" style="display:none;" class="empty-state">
        <p>輸入用戶代號並按「查詢」以查看分析資料。</p>
      </div>

      <!-- Sessions table -->
      <div class="card" id="card-sessions">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">📋 測驗紀錄</span>
        </div>
        <div id="sessions-content"></div>
      </div>

      <!-- Topic selector (for analytics) -->
      <div class="card" id="card-topic-selector" style="display:none;margin-bottom:1rem;">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">📂 選擇主題（分析）</span>
        </div>
        <div id="topic-tabs" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.25rem;"></div>
      </div>

      <!-- Metrics row -->
      <div id="metrics-row" class="metrics-grid"></div>

      <!-- Trend chart -->
      <div class="card" id="card-trend">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">📈 答對率趨勢</span>
        </div>
        <div id="trend-content"></div>
      </div>

      <!-- Weakness diagnosis -->
      <div class="card" id="card-weakness">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">🔍 弱點診斷</span>
        </div>
        <div id="weakness-content"></div>
      </div>

      <!-- Unit accuracy chart -->
      <div class="card" id="card-unit-chart">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">📊 各單元答對率</span>
        </div>
        <div id="unit-chart-content"></div>
      </div>

      <!-- Top wrong questions -->
      <div class="card" id="card-top-wrong">
        <div class="section-header">
          <div class="section-bar"></div>
          <span class="section-title">❌ 高頻錯題 Top 10</span>
        </div>
        <div id="top-wrong-content"></div>
      </div>

    </div>

    <div id="no-users" style="display:none;" class="empty-state">
      <p>目前尚無任何用戶紀錄。請先至首頁進行測驗。</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:1rem;">前往首頁</a>
    </div>

  </main>
</div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/parser.js"></script>
<script>
  // 舊主題名稱對應新名稱（同一份題庫改名後的別名合併）
  const TOPIC_ALIASES = {
    "品牌企劃師初級備考": "iPAS 品牌企劃師初級",
  };
  function normalizeTopic(t) { return TOPIC_ALIASES[t] || t; }

  let chartInstances = {};
  let allResults = [];
  let allSessions = [];
  let sessionLookup = {};
  let manifestData = null;
  let userNameToId = {};
  let currentTopic = null;
  let sessionPage = 0;
  const SESSION_PAGE_SIZE = 10;

  async function getManifest() {
    if (!manifestData) {
      const res = await fetch("questions/manifest.json");
      manifestData = await res.json();
    }
    return manifestData;
  }

  function getUnitFullName(topicName, unitId, manifest) {
    const topicData = manifest.topics.find(t => t.name === topicName);
    if (!topicData) return unitId;
    const unitData = topicData.units.find(u => u.unit === unitId);
    if (!unitData) return unitId;
    return unitData.file.replace(/\.md$/i, "");
  }

  // 將 question_results.unit（由檔名衍生）還原為 manifest 的 unit 名稱
  // 解決 ERP 等非 Day-X 格式主題的單元名稱不一致問題
  function normalizeUnitName(topicName, rawUnit) {
    if (!manifestData) return rawUnit;
    const topicData = manifestData.topics.find(t => t.name === topicName);
    if (!topicData) return rawUnit;
    const unitData = topicData.units.find(u =>
      u.unit === rawUnit || _getUnitName(u.file) === rawUnit
    );
    return unitData ? unitData.unit : rawUnit;
  }

  async function init() {
    // 讀取登入狀態
    const savedUser = sessionStorage.getItem("quizUser");
    const loggedInUser = savedUser ? JSON.parse(savedUser) : null;

    const users = await getAllUsers();
    document.getElementById("loading").style.display = "none";

    if (!users.length) {
      document.getElementById("no-users").style.display = "block";
      return;
    }

    document.getElementById("content").style.display = "block";

    const datalist = document.getElementById("user-datalist");
    users.forEach((u) => {
      userNameToId[u.name] = u.id;
      const opt = document.createElement("option");
      opt.value = u.name;
      datalist.appendChild(opt);
    });

    const input = document.getElementById("user-input");

    if (loggedInUser && userNameToId[loggedInUser.name]) {
      // 已登入 → 預填並自動載入
      input.value = loggedInUser.name;
      loadUser(userNameToId[loggedInUser.name]);
    } else {
      // 未登入 → 顯示佔位提示，等待主動查詢
      document.getElementById("no-selection").style.display = "block";
      hideAnalytics();
    }

    function triggerSearch() {
      const name = input.value.trim();
      const id = userNameToId[name];
      const hint = document.getElementById("user-hint");
      if (id) {
        hint.style.display = "none";
        document.getElementById("no-selection").style.display = "none";
        loadUser(id);
      } else if (name) {
        hint.style.color = "#EF4444";
        hint.textContent = `找不到用戶「${name}」`;
        hint.style.display = "block";
      }
    }

    input.addEventListener("change", triggerSearch);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") triggerSearch(); });
    document.getElementById("btn-search-user").addEventListener("click", triggerSearch);
  }

  function hideAnalytics() {
    document.getElementById("card-topic-selector").style.display = "none";
    document.getElementById("metrics-row").innerHTML = "";
    document.getElementById("card-sessions").style.display = "none";
    document.getElementById("card-trend").style.display = "none";
    document.getElementById("card-weakness").style.display = "none";
    document.getElementById("card-unit-chart").style.display = "none";
    document.getElementById("card-top-wrong").style.display = "none";
  }

  function groupBy(arr, keyFn) {
    return arr.reduce((acc, item) => {
      const key = keyFn(item);
      if (!acc[key]) acc[key] = [];
      acc[key].push(item);
      return acc;
    }, {});
  }

  async function loadUser(userId) {
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};
    // 確保所有分析卡片可見（從未登入隱藏狀態恢復）
    ["card-sessions","card-trend","card-weakness","card-unit-chart","card-top-wrong"]
      .forEach(id => document.getElementById(id).style.display = "block");

    const [sessions, results, manifest] = await Promise.all([
      getUserSessions(userId),
      getUserQuestionResults(userId),
      getManifest(),
    ]);
    // 合併舊主題名稱（同一題庫改名前的資料）
    allSessions = sessions.map(s => ({ ...s, topic: normalizeTopic(s.topic) }));
    allResults = results.map(r => ({ ...r, topic: normalizeTopic(r.topic) }));
    sessionLookup = {};
    allSessions.forEach(s => { sessionLookup[s.id] = s; });

    // 測驗紀錄：全部主題，不過濾，從第一頁開始
    sessionPage = 0;
    renderSessions(allSessions, manifest, 0);

    // 主題 tabs
    const topics = [...new Set(allSessions.map(s => s.topic))];
    renderTopicTabs(topics);
  }

  function renderTopicTabs(topics) {
    const card = document.getElementById("card-topic-selector");
    const tabsEl = document.getElementById("topic-tabs");

    if (!topics.length) {
      card.style.display = "none";
      clearAnalytics();
      return;
    }

    card.style.display = "block";
    tabsEl.innerHTML = topics.map((t, i) => `
      <button class="topic-tab${i === 0 ? ' topic-tab--active' : ''}"
              data-topic="${t}"
              onclick="selectTopic('${t.replace(/'/g,"\\'")}', this)">
        ${t}
      </button>
    `).join("");

    // 預設選第一個主題
    currentTopic = topics[0];
    renderAnalytics(currentTopic);
  }

  function selectTopic(topic, btn) {
    document.querySelectorAll(".topic-tab").forEach(b => b.classList.remove("topic-tab--active"));
    btn.classList.add("topic-tab--active");
    currentTopic = topic;
    renderAnalytics(topic);
  }

  function clearAnalytics() {
    document.getElementById("metrics-row").innerHTML = "";
    document.getElementById("trend-content").innerHTML = "";
    document.getElementById("weakness-content").innerHTML = "";
    document.getElementById("unit-chart-content").innerHTML = "";
    document.getElementById("top-wrong-content").innerHTML = "";
  }

  function renderAnalytics(topic) {
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};

    const sessions = allSessions.filter(s => s.topic === topic);
    const results  = allResults.filter(r => r.topic === topic);

    renderMetrics(sessions);
    renderTrend(sessions);
    renderWeakness(results);
    renderUnitChart(results);
    renderTopWrong(results);
  }

  function renderMetrics(sessions) {
    const el = document.getElementById("metrics-row");
    if (!sessions.length) { el.innerHTML = ""; return; }

    const totalS = sessions.length;
    const avgAcc = sessions.reduce((a, s) => a + (s.total_questions > 0 ? s.correct_count / s.total_questions * 100 : 0), 0) / totalS;
    const totalQ = sessions.reduce((a, s) => a + s.total_questions, 0);
    const best = Math.max(...sessions.filter(s => s.total_questions > 0).map(s => s.correct_count / s.total_questions * 100));

    el.innerHTML = [
      { label: "測驗次數", value: `${totalS} 次` },
      { label: "平均答對率", value: `${avgAcc.toFixed(1)}%` },
      { label: "累計作答題數", value: `${totalQ} 題` },
      { label: "最高答對率", value: `${best.toFixed(1)}%` },
    ].map(m => `
      <div class="card" style="margin-bottom:0;text-align:center;padding:1rem;">
        <div style="font-size:1.3rem;font-weight:800;color:#111827;">${m.value}</div>
        <div style="font-size:0.72rem;color:#6B7280;margin-top:0.25rem;">${m.label}</div>
      </div>
    `).join("");
  }

  function renderSessions(sessions, manifest, page = 0) {
    const el = document.getElementById("sessions-content");
    if (!sessions.length) {
      el.innerHTML = `<div class="empty-state"><p>此用戶尚無測驗紀錄。</p></div>`;
      return;
    }

    const wrongCountMap = {};
    allResults.forEach(r => {
      if (!r.is_correct) wrongCountMap[r.session_id] = (wrongCountMap[r.session_id] || 0) + 1;
    });

    const totalPages = Math.ceil(sessions.length / SESSION_PAGE_SIZE);
    const pageStart = page * SESSION_PAGE_SIZE;
    const pageSessions = sessions.slice(pageStart, pageStart + SESSION_PAGE_SIZE);

    const rows = pageSessions.map((s) => {
      const acc = s.total_questions > 0 ? (s.correct_count / s.total_questions * 100) : 0;
      const badgeCls = acc >= 80 ? "badge-green" : acc >= 60 ? "badge-yellow" : "badge-red";

      const units = Array.isArray(s.units) ? s.units : [s.units];
      const unitNames = units.map(u => getUnitFullName(s.topic, u, manifest));
      const unitsHtml = unitNames.map(n =>
        `<span style="display:block;font-size:0.75rem;color:#374151;line-height:1.55;">${n}</span>`
      ).join("");

      const wrongCount = wrongCountMap[s.id] || 0;
      const btnStyle = wrongCount > 0
        ? "background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;"
        : "background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0;";
      const btnText = wrongCount > 0 ? `回顧錯題（${wrongCount} 題）` : "全對 ✓";

      return `
        <tr>
          <td>${s.taken_at.slice(0, 16).replace("T", " ")}</td>
          <td style="font-size:0.82rem;">${s.topic}</td>
          <td>${unitsHtml}</td>
          <td>${s.correct_count} / ${s.total_questions}</td>
          <td><span class="badge ${badgeCls}">${acc.toFixed(1)}%</span></td>
          <td>
            <button onclick="toggleReview(${s.id}, this)"
                    style="font-size:0.74rem;padding:0.28rem 0.6rem;border-radius:6px;
                           cursor:pointer;${btnStyle}font-weight:600;white-space:nowrap;">
              ${btnText}
            </button>
          </td>
        </tr>
        <tr id="review-row-${s.id}" style="display:none;">
          <td colspan="6" style="padding:0;background:#FAFAFA;"></td>
        </tr>`;
    }).join("");

    const pagination = totalPages > 1 ? `
      <div class="session-pagination">
        <button class="btn btn-ghost btn-sm" ${page === 0 ? 'disabled' : ''}
                onclick="goToSessionPage(${page - 1})">← 較新</button>
        <span style="font-size:0.74rem;color:#6B7280;">第 ${page + 1} / ${totalPages} 頁，共 ${sessions.length} 筆</span>
        <button class="btn btn-ghost btn-sm" ${page >= totalPages - 1 ? 'disabled' : ''}
                onclick="goToSessionPage(${page + 1})">較舊 →</button>
      </div>` : "";

    el.innerHTML = `<table>
      <thead><tr><th>日期</th><th>主題</th><th>單元</th><th>答對</th><th>答對率</th><th>回顧</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>${pagination}`;
  }

  function goToSessionPage(page) {
    sessionPage = page;
    renderSessions(allSessions, manifestData, page);
  }

  async function toggleReview(sessionId, btn) {
    const reviewRow = document.getElementById(`review-row-${sessionId}`);
    const td = reviewRow.querySelector("td");

    if (reviewRow.style.display !== "none") {
      reviewRow.style.display = "none";
      return;
    }

    reviewRow.style.display = "";
    td.innerHTML = `<div style="padding:1rem;color:#6B7280;font-size:0.82rem;">載入題目中…</div>`;

    const wrongResults = allResults.filter(r => r.session_id === sessionId && !r.is_correct);

    if (wrongResults.length === 0) {
      td.innerHTML = `<div style="padding:1rem;color:#10B981;font-size:0.82rem;">🎉 本次測驗全部答對！</div>`;
      return;
    }

    const session = sessionLookup[sessionId];

    try {
      const questions = await loadQuestions(session.topic, session.units);
      if (!questions || questions.length === 0) {
        throw new Error("無法從題庫載入任何題目，請檢查題庫檔案路徑或格式。");
      }

      const questionMap = {};
      for (const q of questions) questionMap[q.id] = q;

      const items = wrongResults.map(r => {
        let q = questionMap[r.question_id];

        // 備援機制：如果 ID 不匹配，嘗試透過序號比對
        if (!q) {
          const idParts = r.question_id.split("__");
          const qNum = parseInt(idParts[idParts.length - 1], 10);
          
          // 先嘗試在同單元找
          q = questions.find(qu => qu.number === qNum && qu.unit === r.unit);
          
          // 若還是找不到，就在所有載入的題目中找相同序號者（處理單元名稱異動）
          if (!q) {
            q = questions.find(qu => qu.number === qNum);
          }
        }

        // 以重新解析的題目原始答案字母來標示正確選項
        // （DB 儲存的 correct_answer 是打亂後字母，與原始選項順序不符）
        const correctLetter = q ? q.answer : r.correct_answer;
        const optHtml = ["A","B","C","D"].map(letter => {
          if (!q || !q.options[letter]) return "";
          const isCorrect = letter === correctLetter;
          let style = "font-size:0.79rem;padding:0.1rem 0;";
          if (isCorrect) style += "color:#10B981;font-weight:700;";
          else           style += "color:#6B7280;";
          return `<div style="${style}">(${letter}) ${q.options[letter]}${isCorrect ? " ✓" : ""}</div>`;
        }).join("");

        const qText  = q ? `${q.number}. ${q.question}` : `（找不到題目內容，ID：${r.question_id}）`;
        const expText = q && q.explanation ? q.explanation : (q ? "（此題無詳細解析內容）" : "（解析無法載入，請確認題庫檔案是否存在或格式正確）");

        return `
          <div style="border:1px solid #FECDD3;border-radius:8px;padding:0.85rem 1rem;
                      margin-bottom:0.65rem;background:#FFFAFA;">
            <div style="font-size:0.83rem;font-weight:600;color:#111827;
                        margin-bottom:0.45rem;line-height:1.5;">${qText}</div>
            <div style="margin-bottom:0.5rem;">${optHtml}</div>
            <div style="background:#EEF2FF;border-radius:6px;padding:0.45rem 0.7rem;
                        font-size:0.77rem;color:#3730A3;line-height:1.65;">
              <strong>💡 解析：</strong>${expText}
            </div>
          </div>`;
      }).join("");

      td.innerHTML = `<div style="padding:0.8rem 1.1rem 1rem;">${items}</div>`;
    } catch (e) {
      td.innerHTML = `<div style="padding:1rem;color:#EF4444;font-size:0.82rem;">載入失敗：${e.message}</div>`;
    }
  }

  function renderTrend(sessions) {
    const el = document.getElementById("trend-content");

    if (!sessions.length) {
      el.innerHTML = `<div class="empty-state"><p>需要 2 次以上測驗才能顯示趨勢圖。</p></div>`;
      return;
    }

    const byTopic = groupBy(sessions, s => s.topic);
    const topics = Object.keys(byTopic);

    const topicColors = ["#6366F1","#10B981","#F59E0B","#EF4444","#8B5CF6","#06B6D4"];

    el.innerHTML = topics.map((topic, i) => {
      const topicSessions = byTopic[topic];
      const sep = i > 0 ? "margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid #E5E7EB;" : "";
      const header = topics.length > 1
        ? `<div style="font-size:0.8rem;font-weight:700;color:${topicColors[i % topicColors.length]};
                       margin-bottom:0.6rem;">${topic}</div>`
        : "";
      if (topicSessions.length < 2) {
        const msg = topicSessions.length === 1
          ? `最近一次答對率：${(topicSessions[0].correct_count/topicSessions[0].total_questions*100).toFixed(1)}%<br>
             <span style="font-size:0.78rem;color:#9CA3AF;">需 2 次以上才能顯示趨勢圖。</span>`
          : "需要 2 次以上測驗才能顯示趨勢圖。";
        return `<div style="${sep}">${header}<div style="font-size:0.875rem;color:#6B7280;">${msg}</div></div>`;
      }
      return `<div style="${sep}">${header}
        <div class="chart-container"><canvas id="trend-c-${i}"></canvas></div>
      </div>`;
    }).join("");

    topics.forEach((topic, i) => {
      const topicSessions = byTopic[topic];
      if (topicSessions.length < 2) return;
      const reversed = [...topicSessions].reverse();
      const color = topicColors[i % topicColors.length];
      chartInstances[`trend-${i}`] = new Chart(document.getElementById(`trend-c-${i}`), {
        type: "line",
        data: {
          labels: reversed.map((_, j) => `第 ${j + 1} 次`),
          datasets: [{
            data: reversed.map(s => s.total_questions > 0 ? +(s.correct_count / s.total_questions * 100).toFixed(1) : 0),
            borderColor: color,
            backgroundColor: color + "14",
            pointBackgroundColor: color,
            pointRadius: 4, borderWidth: 2.5, tension: 0.3, fill: true,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { min: 0, max: 105, grid: { color: "#F1F5F9" }, ticks: { callback: v => v + "%" } },
            x: { grid: { display: false } },
          },
        },
      });
    });
  }

  function renderWeakness(results) {
    const el = document.getElementById("weakness-content");
    if (!results.length) {
      el.innerHTML = `<div class="empty-state"><p>尚無題目作答紀錄，完成測驗後即可查看弱點分析。</p></div>`;
      return;
    }

    const col = (entries, bg, border, titleColor, title, valColor) => {
      const items = entries.length
        ? entries.map(([u, a]) => `
          <div style="display:flex;justify-content:space-between;align-items:center;
                      padding:0.3rem 0;border-bottom:1px solid ${border};">
            <span style="font-size:0.81rem;color:#374151;">${u}</span>
            <span style="font-weight:700;color:${valColor};font-size:0.84rem;">${a.toFixed(1)}%</span>
          </div>`).join("")
        : `<div style="font-size:0.78rem;color:#94A3B8;">無</div>`;
      return `<div style="background:${bg};border-radius:10px;padding:1rem 1.1rem;
                           border:1px solid ${border};min-height:80px;">
        <div style="font-weight:700;color:${titleColor};font-size:0.82rem;margin-bottom:0.7rem;">${title}</div>
        ${items}
      </div>`;
    };

    const byTopic = groupBy(results, r => r.topic);
    const topics = Object.keys(byTopic);

    const blocks = topics.map((topic, tIdx) => {
      const topicResults = byTopic[topic];
      const unitCorrect = {}, unitTotal = {};
      topicResults.forEach(r => {
        const unitKey = normalizeUnitName(r.topic, r.unit);
        unitTotal[unitKey] = (unitTotal[unitKey] || 0) + 1;
        if (r.is_correct) unitCorrect[unitKey] = (unitCorrect[unitKey] || 0) + 1;
      });

      const unitAcc = {};
      Object.keys(unitTotal).forEach(u => {
        if (unitTotal[u] >= 3) unitAcc[u] = ((unitCorrect[u] || 0) / unitTotal[u]) * 100;
      });

      const sep = tIdx > 0 ? "margin-top:1.3rem;padding-top:1.3rem;border-top:1px solid #E5E7EB;" : "";
      const header = topics.length > 1
        ? `<div style="font-size:0.82rem;font-weight:700;color:#4F46E5;margin-bottom:0.8rem;
                       padding-bottom:0.4rem;border-bottom:2px solid #E0E7FF;">${topic}</div>`
        : "";

      if (!Object.keys(unitAcc).length) {
        return `<div style="${sep}">${header}
          <div style="font-size:0.82rem;color:#6B7280;">作答題數尚不足（每單元需至少 3 題）。</div>
        </div>`;
      }

      const weak = Object.entries(unitAcc).filter(([,a]) => a < 60).sort((a,b) => a[1]-b[1]);
      const mid  = Object.entries(unitAcc).filter(([,a]) => a >= 60 && a < 80).sort((a,b) => a[1]-b[1]);
      const good = Object.entries(unitAcc).filter(([,a]) => a >= 80).sort((a,b) => b[1]-a[1]);

      const priority = [...weak, ...mid].slice(0, 3);
      const suggestion = priority.length
        ? `<div style="background:#EEF2FF;border-radius:10px;padding:1rem 1.1rem;
                       border:1px solid #C7D2FE;margin-top:0.9rem;">
            <div style="font-weight:700;color:#3730A3;font-size:0.82rem;margin-bottom:0.5rem;">💡 強化建議</div>
            <div style="font-size:0.8rem;color:#374151;line-height:1.7;">
              建議優先複習 <strong>${priority.map(([u])=>u).join("、")}</strong> 等單元。<br>
              可至首頁單獨選取這些單元進行針對性練習，透過多次重複練習提升答對率。
            </div>
          </div>` : "";

      return `<div style="${sep}">
        ${header}
        <div class="weakness-cols">
          ${col(weak, "#FFF5F5", "#FED7D7", "#C53030", "🔴 需要加強", "#EF4444")}
          ${col(mid,  "#FFFBEB", "#FDE68A", "#92400E", "🟡 尚可，可繼續加強", "#F59E0B")}
          ${col(good, "#F0FDF4", "#BBF7D0", "#166534", "🟢 掌握良好", "#10B981")}
        </div>
        ${suggestion}
      </div>`;
    });

    el.innerHTML = blocks.join("");
  }

  function renderUnitChart(results) {
    const el = document.getElementById("unit-chart-content");
    if (!results.length) { el.innerHTML = ""; return; }

    const getColor = v => v >= 80 ? "#10B981" : v >= 60 ? "#F59E0B" : "#EF4444";
    const byTopic = groupBy(results, r => r.topic);
    const topics = Object.keys(byTopic);

    el.innerHTML = topics.map((topic, i) => {
      const topicResults = byTopic[topic];
      const unitCorrect = {}, unitTotal = {};
      topicResults.forEach(r => {
        const unitKey = normalizeUnitName(r.topic, r.unit);
        unitTotal[unitKey] = (unitTotal[unitKey] || 0) + 1;
        if (r.is_correct) unitCorrect[unitKey] = (unitCorrect[unitKey] || 0) + 1;
      });
      const unitCount = Object.keys(unitTotal).length;
      const chartH = Math.max(180, unitCount * 36);
      const sep = i > 0 ? "margin-top:1.3rem;padding-top:1.3rem;border-top:1px solid #E5E7EB;" : "";
      const header = topics.length > 1
        ? `<div style="font-size:0.82rem;font-weight:700;color:#4F46E5;margin-bottom:0.7rem;
                       padding-bottom:0.4rem;border-bottom:2px solid #E0E7FF;">${topic}</div>`
        : "";
      return `<div style="${sep}">${header}
        <div class="chart-container" style="height:${chartH}px;"><canvas id="unit-c-${i}"></canvas></div>
      </div>`;
    }).join("");

    topics.forEach((topic, i) => {
      const topicResults = byTopic[topic];
      const unitCorrect = {}, unitTotal = {};
      topicResults.forEach(r => {
        const unitKey = normalizeUnitName(r.topic, r.unit);
        unitTotal[unitKey] = (unitTotal[unitKey] || 0) + 1;
        if (r.is_correct) unitCorrect[unitKey] = (unitCorrect[unitKey] || 0) + 1;
      });
      const sorted = Object.keys(unitTotal)
        .map(k => ({ k, acc: +((unitCorrect[k] || 0) / unitTotal[k] * 100).toFixed(1) }))
        .sort((a, b) => a.acc - b.acc);

      chartInstances[`unit-${i}`] = new Chart(document.getElementById(`unit-c-${i}`), {
        type: "bar",
        data: {
          labels: sorted.map(d => d.k),
          datasets: [{ data: sorted.map(d => d.acc), backgroundColor: sorted.map(d => getColor(d.acc)), borderRadius: 4 }],
        },
        options: {
          indexAxis: "y",
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { min: 0, max: 115, grid: { display: false }, ticks: { callback: v => v + "%" } },
            y: { grid: { color: "#F1F5F9" } },
          },
        },
      });
    });
  }

  function renderTopWrong(results) {
    const el = document.getElementById("top-wrong-content");

    const wrongByTopic = {};
    results.forEach(r => {
      if (!r.is_correct) {
        if (!wrongByTopic[r.topic]) wrongByTopic[r.topic] = {};
        wrongByTopic[r.topic][r.question_id] = (wrongByTopic[r.topic][r.question_id] || 0) + 1;
      }
    });

    const topics = Object.keys(wrongByTopic);

    if (!topics.length) {
      el.innerHTML = `<div style="color:#10B981;font-size:0.875rem;padding:0.5rem 0;">目前沒有答錯的題目！</div>`;
      return;
    }

    el.innerHTML = topics.map((topic, tIdx) => {
      const top10 = Object.entries(wrongByTopic[topic]).sort((a, b) => b[1] - a[1]).slice(0, 10);
      const sep = tIdx > 0 ? "margin-top:1.3rem;padding-top:1.3rem;border-top:1px solid #E5E7EB;" : "";
      const header = topics.length > 1
        ? `<div style="font-size:0.82rem;font-weight:700;color:#4F46E5;margin-bottom:0.7rem;
                       padding-bottom:0.4rem;border-bottom:2px solid #E0E7FF;">${topic}</div>`
        : "";
      const rows = top10.map(([qid, cnt]) => {
        const display = qid.length > 60 ? qid.slice(0, 60) + "..." : qid;
        return `<tr>
          <td style="font-size:0.8rem;color:#374151;">${display}</td>
          <td style="text-align:center;"><span class="badge badge-red">${cnt}</span></td>
        </tr>`;
      }).join("");
      return `<div style="${sep}">${header}
        <table>
          <thead><tr><th>題目 ID</th><th style="text-align:center;">答錯次數</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join("");
  }

  init().catch((e) => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").innerHTML =
      `<div class="empty-state"><p>載入失敗，請重新整理。<br><small>${e.message}</small></p></div>`;
    document.getElementById("content").style.display = "block";
  });
</script>
<script src="js/pwa.js"></script>
</body>
</html>
